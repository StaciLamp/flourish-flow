<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Daily Rhythm — Flourish & Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Poppins:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream: #f6f4f0;
  --cream-dark: #ede9e3;
  --sage: #8ea185;
  --deep: #758578;
  --terra: #a1765a;
  --dark: #3a3d38;
  --slate: #919d9d;
  --border: #d4cfc8;
  --white: #fdfcfa;
}

html, body { height: 100%; }

body {
  font-family: 'Poppins', sans-serif;
  font-weight: 300;
  background: var(--cream);
  color: var(--dark);
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* HEADER */
.header {
  text-align: center;
  padding: 48px 24px 32px;
  border-bottom: 1px solid var(--border);
  background: var(--white);
}

.header-eyebrow {
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--sage);
  margin-bottom: 12px;
}

.header h1 {
  font-family: 'Abril Fatface', serif;
  font-size: clamp(36px, 8vw, 56px);
  color: var(--dark);
  line-height: 1.05;
  margin-bottom: 8px;
}

.header h1 span { color: var(--terra); }

.header-sub {
  font-size: 13px;
  color: var(--slate);
  font-weight: 300;
  font-style: italic;
}

/* CHAT CONTAINER */
.chat-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 680px;
  width: 100%;
  margin: 0 auto;
  padding: 0 16px;
}

.messages {
  flex: 1;
  padding: 32px 0 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  overflow-y: auto;
}

/* MESSAGES */
.msg {
  display: flex;
  gap: 12px;
  animation: msgIn 0.4s ease forwards;
  opacity: 0;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  margin-top: 2px;
}

.msg.bot .msg-avatar {
  background: var(--sage);
  color: #fff;
}

.msg.user .msg-avatar {
  background: var(--terra);
  color: #fff;
  font-size: 11px;
  font-weight: 500;
}

.msg-bubble {
  max-width: 78%;
  padding: 14px 18px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.75;
  font-weight: 300;
}

.msg.bot .msg-bubble {
  background: var(--white);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--dark);
}

.msg.user .msg-bubble {
  background: var(--terra);
  color: #fff;
  border-bottom-right-radius: 4px;
}

.msg-bubble strong { font-weight: 500; }
.msg-bubble em { font-style: italic; opacity: 0.85; }

.msg-bubble h2 {
  font-family: 'Abril Fatface', serif;
  font-size: 20px;
  font-weight: 400;
  color: var(--dark);
  margin: 16px 0 8px;
  line-height: 1.2;
}

.msg-bubble h2:first-child { margin-top: 0; }

.msg-bubble h3 {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--terra);
  margin: 14px 0 4px;
}

.msg-bubble p { margin-bottom: 10px; }
.msg-bubble p:last-child { margin-bottom: 0; }

/* RHYTHM RESULT BUBBLE */
.msg.result .msg-bubble {
  background: var(--white);
  border: 1px solid var(--border);
  border-top: 3px solid var(--sage);
  border-bottom-left-radius: 4px;
  max-width: 90%;
}

/* CALENDAR CARD */
.calendar-card {
  background: var(--cream-dark);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-top: 16px;
}

.calendar-card-title {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--terra);
  margin-bottom: 12px;
}

.cal-events {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}

.cal-event {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 8px 12px;
  font-size: 12px;
}

.cal-event-time {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.1em;
  color: var(--terra);
  min-width: 52px;
}

.cal-event-name { color: var(--dark); font-weight: 400; }

.cal-btns { display: flex; gap: 8px; flex-wrap: wrap; }

.cal-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 10px 16px;
  border-radius: 7px;
  font-family: 'Poppins', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}

.cal-btn-dark {
  background: var(--dark);
  color: #fff;
}
.cal-btn-dark:hover { background: #2a2c28; }

.cal-btn-outline {
  background: transparent;
  color: var(--dark);
  border: 1px solid var(--border);
}
.cal-btn-outline:hover { border-color: var(--sage); color: var(--sage); }

/* TYPING INDICATOR */
.typing {
  display: flex;
  gap: 12px;
  align-items: center;
  opacity: 0;
  transition: opacity 0.3s;
}

.typing.active { opacity: 1; }

.typing-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--sage);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
}

.typing-dots {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 18px;
  border-bottom-left-radius: 4px;
  padding: 14px 18px;
  display: flex;
  gap: 5px;
  align-items: center;
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--border);
  animation: dotBounce 1.2s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotBounce {
  0%, 60%, 100% { transform: translateY(0); background: var(--border); }
  30% { transform: translateY(-5px); background: var(--sage); }
}

/* EMAIL GATE */
.email-gate {
  background: var(--white);
  border: 1px solid var(--border);
  border-top: 3px solid var(--terra);
  border-radius: 18px;
  border-bottom-left-radius: 4px;
  padding: 24px;
  max-width: 78%;
  animation: msgIn 0.4s ease forwards;
}

.email-gate h3 {
  font-family: 'Abril Fatface', serif;
  font-size: 22px;
  font-weight: 400;
  color: var(--dark);
  margin-bottom: 8px;
  line-height: 1.2;
}

.email-gate p {
  font-size: 13px;
  color: var(--slate);
  line-height: 1.8;
  margin-bottom: 16px;
  font-weight: 300;
}

.email-fields {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 10px;
}

.email-fields input {
  width: 100%;
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 11px 14px;
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 300;
  color: var(--dark);
  transition: border-color 0.2s;
}

.email-fields input:focus {
  outline: none;
  border-color: var(--sage);
}

.email-submit {
  width: 100%;
  padding: 13px;
  background: var(--terra);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: 'Poppins', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 4px;
}

.email-submit:hover { background: #8f6348; }

.privacy {
  font-size: 10px;
  color: var(--border);
  text-align: center;
  margin-top: 8px;
  letter-spacing: 0.04em;
}

/* INPUT AREA */
.input-area {
  border-top: 1px solid var(--border);
  background: var(--white);
  padding: 16px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-wrap {
  flex: 1;
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 11px 18px;
  display: flex;
  align-items: center;
  transition: border-color 0.2s;
}

.input-wrap:focus-within { border-color: var(--sage); }

#userInput {
  flex: 1;
  border: none;
  background: transparent;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  font-weight: 300;
  color: var(--dark);
  resize: none;
  max-height: 120px;
  line-height: 1.5;
}

#userInput:focus { outline: none; }
#userInput::placeholder { color: var(--slate); }

.send-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--sage);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, transform 0.15s;
  flex-shrink: 0;
}

.send-btn:hover { background: var(--deep); transform: scale(1.05); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.send-btn svg { width: 16px; height: 16px; }

/* REFINE AREA */
.refine-area {
  display: none;
  border-top: 1px solid var(--border);
  background: var(--cream-dark);
  padding: 12px 16px;
}

.refine-area.active { display: block; }

.refine-label {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--deep);
  margin-bottom: 8px;
}

.refine-row {
  display: flex;
  gap: 8px;
}

.refine-input {
  flex: 1;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 10px 16px;
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 300;
  color: var(--dark);
}

.refine-input:focus { outline: none; border-color: var(--deep); }

.refine-btn {
  padding: 10px 18px;
  background: var(--deep);
  color: #fff;
  border: none;
  border-radius: 20px;
  font-family: 'Poppins', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.2s;
}

.refine-btn:hover { background: #5a6b5d; }

.error-msg {
  font-size: 12px;
  color: var(--terra);
  padding: 6px 0;
  display: none;
}
.error-msg.active { display: block; }

@media (max-width: 520px) {
  .header { padding: 32px 20px 24px; }
  .msg-bubble { max-width: 88%; }
  .email-gate { max-width: 92%; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">✦ A free gift from Flourish & Flow ✦</div>
  <h1>Your Daily<br><span>Rhythm</span></h1>
  <p class="header-sub">A conversation that builds your personalized daily flow</p>
</div>

<div class="chat-wrap">
  <div class="messages" id="messages">
    <!-- Messages appear here -->
  </div>

  <div class="typing" id="typing">
    <div class="typing-avatar">🌿</div>
    <div class="typing-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <div class="input-area" id="inputArea">
    <div class="input-wrap">
      <textarea
        id="userInput"
        placeholder="Share your thoughts..."
        rows="1"
      ></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z"/>
      </svg>
    </button>
  </div>

  <div class="refine-area" id="refineArea">
    <div class="refine-label">✦ Something feel off? Refine your rhythm</div>
    <div class="refine-row">
      <input class="refine-input" id="refineInput" placeholder="Tell me what to adjust...">
      <button class="refine-btn" onclick="refineRhythm()">↻ Refine</button>
    </div>
    <div class="error-msg" id="refineError"></div>
  </div>
</div>

<script>
const FLODESK_API_KEY = 'fd_key_12cf5aafc4e1422bbd567dbb09e9de35.NwwaMTDxv4VSTZdAS9xShIO6rnlj2sRwN3vdEyQ8ZYfXQhISTGdlGfloeXIJypO68EL0J1vuqw8AK3a6gcYqKKu0d0UY1rP4cpX1hp4pLWP0JaiWLqzuUqLbInyNKbw8Mmrx9JplggkQGOZdC8K834HR3WppljdmvtKwc01A3lS8NNbsFHU2ceXwen86w6vN';
const FLODESK_SEGMENT_ID = '69eff4c98f1883a079f6de18';

let conversationHistory = [];
let userFirstName = '';
let userEmail = '';
let emailCaptured = false;
let rhythmGenerated = false;
let lastRhythmText = '';
let parsedEvents = [];
let awaitingEmail = false;
let conversationSummary = '';

const SYSTEM_PROMPT = `You are a warm, wise guide from Flourish & Flow — a women's wellness community built around Human Design-aligned living. You're having a genuine one-on-one conversation to help someone build their perfect daily rhythm.

Your personality: Warm, curious, non-judgmental. You feel like a knowledgeable friend who genuinely cares — not a therapist, not a guru. Think: woman who went first, turning around to say "come look at this."

YOUR GOAL: Through natural conversation, gather enough information to build a truly personalized daily rhythm. You need to understand:
- Their Human Design type, authority, and profile (if they know it)
- Their current daily reality — morning, daytime, evening
- What drains them and what lights them up
- Their work schedule and living situation  
- Practices they love or want more of
- Their wake time and sleep needs
- Their current goals and what they're building toward

HOW TO CONVERSE:
- Ask ONE question at a time — never multiple questions in one message
- Respond warmly to what they share before asking the next question
- Follow the thread of what they say — if they mention something interesting, explore it
- Keep your messages short — 2-4 sentences max before your question
- Use their name once you know it
- After 6-10 exchanges you'll have enough — don't drag it out
- When you have enough information, say exactly: "I have everything I need to build your rhythm. Give me just a moment..."

IMPORTANT RULES:
- Never mention that you're an AI or that this is automated
- Never ask for their email — that happens separately
- Keep the conversation feeling alive and personal
- Reference their Human Design details throughout to show you're listening
- When you say you have enough info, STOP asking questions

Start the conversation with a warm, brief welcome and ask for their first name. Keep it to 2-3 sentences max.`;

const RHYTHM_PROMPT = (summary, name) => `Based on this conversation with ${name}, create their personalized daily rhythm.

CONVERSATION SUMMARY:
${summary}

Write a warm, specific daily rhythm with these sections (## for headers):

## Your Morning Ritual
## Midday Reset  
## Afternoon Flow
## Evening Transition
## Bedtime
## Your 3 Non-Negotiables

Opening: 2-3 warm sentences speaking directly to their design and what this rhythm honors.
Closing: 2 sentences referencing their specific goals and signature theme.

Be specific to what they shared. Reference their HD details. No generic wellness advice.

After the rhythm, include:
---CALENDAR_EVENTS---
TIME:HH:MM|TITLE:Event name|DURATION:30|RECUR:DAILY
(5-7 key anchor events)
---END_CALENDAR_EVENTS---`;

// Auto-resize textarea
document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

document.getElementById('userInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function addMessage(role, content, type = 'normal') {
  const messages = document.getElementById('messages');

  if (role === 'email-gate') {
    const gate = document.createElement('div');
    gate.className = 'email-gate';
    gate.id = 'emailGate';
    gate.innerHTML = `
      <h3>Almost there —</h3>
      <p>Drop your email below and I'll reveal your personalized daily rhythm right here. You'll also be the first to hear about future resources from Flourish & Flow.</p>
      <div class="email-fields">
        <input type="email" id="emailInput" placeholder="Your email address">
      </div>
      <button class="email-submit" onclick="submitEmail()">Yes — Reveal My Rhythm →</button>
      <div class="privacy">No spam, ever. Unsubscribe anytime. 🤍</div>
      <div class="error-msg" id="emailError"></div>
    `;
    messages.appendChild(gate);
    scrollToBottom();
    return;
  }

  const msg = document.createElement('div');
  msg.className = `msg ${role}${type === 'result' ? ' result' : ''}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'bot' ? '🌿' : (userFirstName ? userFirstName[0].toUpperCase() : 'Y');

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (type === 'result') {
    bubble.innerHTML = formatRhythm(content);
  } else {
    bubble.innerHTML = content.replace(/\n/g, '<br>');
  }

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  messages.appendChild(msg);
  scrollToBottom();
}

function formatRhythm(text) {
  let html = text
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<p>(<h[23]>)/g, '$1').replace(/(<\/h[23]>)<\/p>/g, '$1');
  return html;
}

function showTyping() {
  document.getElementById('typing').classList.add('active');
  scrollToBottom();
}

function hideTyping() {
  document.getElementById('typing').classList.remove('active');
}

function setInputDisabled(disabled) {
  document.getElementById('userInput').disabled = disabled;
  document.getElementById('sendBtn').disabled = disabled;
}

function scrollToBottom() {
  setTimeout(() => {
    const messages = document.getElementById('messages');
    messages.scrollTop = messages.scrollHeight;
    window.scrollTo(0, document.body.scrollHeight);
  }, 100);
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || document.getElementById('sendBtn').disabled) return;

  input.value = '';
  input.style.height = 'auto';

  // Extract first name from early messages
  if (!userFirstName && conversationHistory.length <= 2) {
    const words = text.split(' ');
    if (words.length <= 3) userFirstName = words[0];
  }

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  setInputDisabled(true);
  showTyping();

  try {
    const res = await fetch('/.netlify/functions/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await res.json();
    if (!res.ok || !data.content) throw new Error('API error');

    const reply = data.content.map(b => b.text || '').join('').trim();
    hideTyping();

    // Check if Claude signals it has enough info
    if (reply.includes("I have everything I need to build your rhythm")) {
      conversationHistory.push({ role: 'assistant', content: reply });
      addMessage('bot', reply);
      conversationSummary = buildSummary();

      // Show email gate
      setTimeout(() => {
        addMessage('email-gate', '');
        setInputDisabled(true);
      }, 800);
    } else {
      conversationHistory.push({ role: 'assistant', content: reply });
      addMessage('bot', reply);
      setInputDisabled(false);
      document.getElementById('userInput').focus();
    }

  } catch(err) {
    hideTyping();
    addMessage('bot', "I'm so sorry — something went wrong on my end. Please try sending that again.");
    setInputDisabled(false);
    console.error(err);
  }
}

function buildSummary() {
  return conversationHistory
    .map(m => `${m.role === 'user' ? 'Her' : 'Guide'}: ${m.content}`)
    .join('\n');
}

async function submitEmail() {
  const email = document.getElementById('emailInput').value.trim();
  if (!email || !email.includes('@')) {
    document.getElementById('emailError').textContent = 'Please enter a valid email.';
    document.getElementById('emailError').classList.add('active');
    return;
  }

  userEmail = email;
  document.getElementById('emailError').classList.remove('active');
  document.getElementById('emailGate').style.opacity = '0.5';
  document.querySelector('.email-submit').textContent = 'Building your rhythm...';
  document.querySelector('.email-submit').disabled = true;

  // Capture to Flodesk silently
  try {
    await fetch('https://api.flodesk.com/v1/subscribers', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Basic ' + btoa(FLODESK_API_KEY + ':')
      },
      body: JSON.stringify({
        email: userEmail,
        first_name: userFirstName,
        segments: [FLODESK_SEGMENT_ID]
      })
    });
  } catch(err) {
    console.error('Flodesk error:', err);
  }

  // Remove gate and generate rhythm
  document.getElementById('emailGate').remove();
  generateRhythm();
}

async function generateRhythm() {
  showTyping();

  try {
    const prompt = RHYTHM_PROMPT(conversationSummary, userFirstName || 'her');

    const res = await fetch('/.netlify/functions/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    if (!res.ok || !data.content) throw new Error('API error');

    const text = data.content.map(b => b.text || '').join('').trim();
    const split = text.split('---CALENDAR_EVENTS---');
    const rhythmText = split[0].trim();
    const calRaw = split[1] ? split[1].split('---END_CALENDAR_EVENTS---')[0].trim() : '';

    lastRhythmText = rhythmText;
    parsedEvents = parseCalendarEvents(calRaw);
    rhythmGenerated = true;

    hideTyping();
    addMessage('bot', `Here's your personalized daily rhythm, ${userFirstName || 'beautiful'} — built just for you. 🌿`);
    setTimeout(() => {
      addMessage('bot', rhythmText, 'result');
      setTimeout(() => {
        addCalendarCard();
        document.getElementById('refineArea').classList.add('active');
      }, 400);
    }, 300);

  } catch(err) {
    hideTyping();
    addMessage('bot', "Something went wrong generating your rhythm. Please refresh and try again.");
    console.error(err);
  }
}

function parseCalendarEvents(raw) {
  if (!raw) return getDefaultEvents();
  const lines = raw.split('\n').filter(l => l.includes('TIME:') && l.includes('TITLE:'));
  const events = lines.map(line => {
    const get = (key) => { const m = line.match(new RegExp(key + ':([^|]+)')); return m ? m[1].trim() : ''; };
    return { time: get('TIME'), title: get('TITLE'), duration: parseInt(get('DURATION')) || 30, note: get('NOTE') };
  }).filter(e => e.time && e.title);
  return events.length >= 3 ? events : getDefaultEvents();
}

const EVENT_NOTES = [
  "You were made to flourish — in your own rhythm, by your own design. 🌿",
  "This is your time. Protect it. It's the foundation everything else builds on.",
  "Your body knows what it needs. This is you listening to it. 🌿",
  "Coming home to yourself, one breath at a time.",
  "This moment is yours. No one else's. Breathe and begin. 🌿",
  "You don't have to earn rest. You were designed for this.",
  "Let this be simple. Show up. That's the whole practice. 🌿",
];

function getDefaultEvents() {
  return [
    { time: '06:45', title: 'Wake + Morning Movement', duration: 15 },
    { time: '07:15', title: 'Journal + Creative Time', duration: 45 },
    { time: '12:00', title: 'Midday Reset', duration: 30 },
    { time: '17:00', title: 'Yoga + Work Close', duration: 45 },
    { time: '21:00', title: 'Evening Wind-Down', duration: 30 },
  ];
}

function buildGoogleUrl(evt, i) {
  const today = new Date();
  const dateStr = today.toISOString().slice(0,10).replace(/-/g,'');
  const pad = n => String(n).padStart(2,'0');
  const [h, m] = evt.time.split(':').map(Number);
  const startDT = `${dateStr}T${pad(h)}${pad(m)}00`;
  const endMins = h * 60 + m + evt.duration;
  const endDT = `${dateStr}T${pad(Math.floor(endMins/60)%24)}${pad(endMins%60)}00`;
  const note = evt.note || EVENT_NOTES[i % EVENT_NOTES.length];
  const details = encodeURIComponent(`${note}\n\nPart of your personalized daily rhythm from stacilamp.com — built around your Human Design. 🌿`);
  const title = encodeURIComponent(`🌿 ${evt.title}`);
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${startDT}/${endDT}&details=${details}&recur=RRULE:FREQ%3DDAILY`;
}

function addAllToGoogle() {

function downloadICS() {
  const today = new Date();
  const pad = n => String(n).padStart(2,'0');
  const dateStr = `${today.getFullYear()}${pad(today.getMonth()+1)}${pad(today.getDate())}`;
  const stampStr = `${dateStr}T${pad(today.getHours())}${pad(today.getMinutes())}${pad(today.getSeconds())}Z`;
  const name = userFirstName ? `${userFirstName}'s` : 'Your';
  let ics = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Flourish & Flow//EN',`X-WR-CALNAME:${name} Daily Rhythm`,'CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  parsedEvents.forEach((evt, i) => {
    const [h, m] = evt.time.split(':').map(Number);
    const startDT = `${dateStr}T${pad(h)}${pad(m)}00`;
    const endMins = h * 60 + m + evt.duration;
    const endDT = `${dateStr}T${pad(Math.floor(endMins/60)%24)}${pad(endMins%60)}00`;
    const note = evt.note || EVENT_NOTES[i % EVENT_NOTES.length];
    ics = ics.concat(['BEGIN:VEVENT',`UID:rhythm-${dateStr}-${i}@stacilamp.com`,`DTSTAMP:${stampStr}`,`DTSTART:${startDT}`,`DTEND:${endDT}`,'RRULE:FREQ=DAILY',`SUMMARY:🌿 ${evt.title}`,`DESCRIPTION:${note}\\n\\nPart of your personalized daily rhythm from stacilamp.com 🌿`,'END:VEVENT']);
  });
  ics.push('END:VCALENDAR');
  const blob = new Blob([ics.join('\r\n')], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'my-daily-rhythm.ics';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

async function refineRhythm() {
  const feedback = document.getElementById('refineInput').value.trim();
  if (!feedback) {
    document.getElementById('refineError').textContent = 'Tell me what to adjust.';
    document.getElementById('refineError').classList.add('active');
    return;
  }
  document.getElementById('refineError').classList.remove('active');
  document.getElementById('refineInput').value = '';

  addMessage('user', feedback);
  setInputDisabled(true);
  showTyping();

  try {
    const prompt = `You previously created a daily rhythm. The person has feedback — revise only what they flagged, keep everything else.

PREVIOUS RHYTHM:
${lastRhythmText.substring(0, 600)}

FEEDBACK: "${feedback}"

Write the revised rhythm using same ## header format. End with 1 sentence on what changed.

---CALENDAR_EVENTS---
TIME:HH:MM|TITLE:Event name|DURATION:30|RECUR:DAILY
(5 key events)
---END_CALENDAR_EVENTS---`;

    const res = await fetch('/.netlify/functions/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'user', content: prompt }] })
    });

    const data = await res.json();
    if (!res.ok || !data.content) throw new Error('API error');

    const text = data.content.map(b => b.text || '').join('').trim();
    const split = text.split('---CALENDAR_EVENTS---');
    const rhythmText = split[0].trim();
    const calRaw = split[1] ? split[1].split('---END_CALENDAR_EVENTS---')[0].trim() : '';

    lastRhythmText = rhythmText;
    parsedEvents = parseCalendarEvents(calRaw);

    hideTyping();
    addMessage('bot', "Here's your refined rhythm — I've adjusted what you flagged. 🌿");
    setTimeout(() => addMessage('bot', rhythmText, 'result'), 300);

  } catch(err) {
    hideTyping();
    addMessage('bot', "Something went wrong — please try again.");
    console.error(err);
  } finally {
    setInputDisabled(false);
  }
}

// Start the conversation
async function startConversation() {
  setInputDisabled(true);
  showTyping();

  try {
    const res = await fetch('/.netlify/functions/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: 'start' }]
      })
    });

    const data = await res.json();
    if (!res.ok || !data.content) throw new Error('API error');

    const reply = data.content.map(b => b.text || '').join('').trim();
    conversationHistory.push({ role: 'assistant', content: reply });

    hideTyping();
    addMessage('bot', reply);
    setInputDisabled(false);
    document.getElementById('userInput').focus();

  } catch(err) {
    hideTyping();
    addMessage('bot', "Hello! I'm so glad you're here. I'm going to help you build a daily rhythm that actually fits your life. Can I start by asking — what's your name?");
    setInputDisabled(false);
    console.error(err);
  }
}

// Boot
window.addEventListener('load', startConversation);
